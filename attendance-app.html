<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Attendance System</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        #root {
            min-height: 100vh;
        }
        
        input, textarea, select {
            font-family: inherit;
            font-size: 15px;
            padding: 10px 12px;
            border: 0.5px solid #ccc;
            border-radius: 6px;
            width: 100%;
            display: block;
        }
        
        input:hover, textarea:hover, select:hover {
            border-color: #999;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #378ADD;
            box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1);
        }
        
        button {
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function AttendanceApp() {
            const [view, setView] = useState('login');
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [currentUser, setCurrentUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [attendanceData, setAttendanceData] = useState([]);
            const [employees, setEmployees] = useState([]);
            const [todayRecord, setTodayRecord] = useState(null);
            const [showAddEmployee, setShowAddEmployee] = useState(false);
            const [newEmployeeName, setNewEmployeeName] = useState('');
            const [newEmployeeUser, setNewEmployeeUser] = useState('');
            const [newEmployeePass, setNewEmployeePass] = useState('');

            // Load data from localStorage on mount
            useEffect(() => {
                const savedEmployees = localStorage.getItem('employees');
                const savedAttendance = localStorage.getItem('attendance');
                
                if (savedEmployees) {
                    setEmployees(JSON.parse(savedEmployees));
                } else {
                    const demoEmployees = [
                        { id: 1, name: 'Admin User', username: 'admin', password: 'admin123', isAdmin: true },
                        { id: 2, name: 'John Smith', username: 'john', password: 'john123', isAdmin: false },
                        { id: 3, name: 'Sarah Johnson', username: 'sarah', password: 'sarah123', isAdmin: false },
                        { id: 4, name: 'Mike Davis', username: 'mike', password: 'mike123', isAdmin: false },
                    ];
                    setEmployees(demoEmployees);
                    localStorage.setItem('employees', JSON.stringify(demoEmployees));
                }
                
                if (savedAttendance) {
                    setAttendanceData(JSON.parse(savedAttendance));
                }
            }, []);

            // Check for today's record
            useEffect(() => {
                if (currentUser) {
                    const today = new Date().toLocaleDateString();
                    const record = attendanceData.find(r => r.employeeId === currentUser.id && r.date === today);
                    setTodayRecord(record);
                }
            }, [attendanceData, currentUser]);

            const handleLogin = () => {
                const user = employees.find(e => e.username === username && e.password === password);
                if (user) {
                    setCurrentUser(user);
                    setIsAdmin(user.isAdmin || false);
                    setIsLoggedIn(true);
                    setView(user.isAdmin ? 'admin-dashboard' : 'employee-dashboard');
                    setUsername('');
                    setPassword('');
                } else {
                    alert('Invalid credentials. Try admin/admin123 or john/john123');
                }
            };

            const handleLogout = () => {
                setIsLoggedIn(false);
                setCurrentUser(null);
                setIsAdmin(false);
                setView('login');
                setUsername('');
                setPassword('');
            };

            const handleCheckIn = () => {
                const today = new Date().toLocaleDateString();
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const newRecord = {
                    id: Date.now(),
                    employeeId: currentUser.id,
                    employeeName: currentUser.name,
                    date: today,
                    checkInTime: now,
                    checkOutTime: null,
                    hoursWorked: null,
                };
                const updated = [...attendanceData, newRecord];
                setAttendanceData(updated);
                localStorage.setItem('attendance', JSON.stringify(updated));
                alert('Check-in recorded at ' + now);
            };

            const handleCheckOut = () => {
                const today = new Date().toLocaleDateString();
                const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const updated = attendanceData.map(r => {
                    if (r.employeeId === currentUser.id && r.date === today) {
                        const [inHour, inMin] = r.checkInTime.split(':').map(Number);
                        const [outHour, outMin] = now.split(':').map(Number);
                        const hours = ((outHour * 60 + outMin) - (inHour * 60 + inMin)) / 60;
                        return { ...r, checkOutTime: now, hoursWorked: Math.max(0, Math.round(hours * 100) / 100) };
                    }
                    return r;
                });
                setAttendanceData(updated);
                localStorage.setItem('attendance', JSON.stringify(updated));
                alert('Check-out recorded at ' + now);
            };

            const handleAddEmployee = () => {
                if (!newEmployeeName || !newEmployeeUser || !newEmployeePass) {
                    alert('All fields required');
                    return;
                }
                if (employees.some(e => e.username === newEmployeeUser)) {
                    alert('Username already exists');
                    return;
                }
                const newEmp = {
                    id: Date.now(),
                    name: newEmployeeName,
                    username: newEmployeeUser,
                    password: newEmployeePass,
                    isAdmin: false,
                };
                const updated = [...employees, newEmp];
                setEmployees(updated);
                localStorage.setItem('employees', JSON.stringify(updated));
                setNewEmployeeName('');
                setNewEmployeeUser('');
                setNewEmployeePass('');
                setShowAddEmployee(false);
                alert('Employee added successfully');
            };

            const handleDeleteEmployee = (id) => {
                if (window.confirm('Delete this employee?')) {
                    const updated = employees.filter(e => e.id !== id);
                    setEmployees(updated);
                    localStorage.setItem('employees', JSON.stringify(updated));
                }
            };

            const exportToCSV = () => {
                let csv = 'Employee Name,Date,Check In,Check Out,Hours Worked\n';
                attendanceData.forEach(r => {
                    csv += `"${r.employeeName}","${r.date}","${r.checkInTime}","${r.checkOutTime || '-'}","${r.hoursWorked || '-'}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `attendance-${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const exportAllToCSV = () => {
                let csv = 'Employee Name,Date,Check In,Check Out,Hours Worked\n';
                attendanceData.slice().reverse().forEach(r => {
                    csv += `"${r.employeeName}","${r.date}","${r.checkInTime}","${r.checkOutTime || '-'}","${r.hoursWorked || '-'}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.setAttribute('href', url);
                link.setAttribute('download', `attendance-all-${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const getInitials = (name) => {
                return name.split(' ').map(n => n[0]).join('').toUpperCase();
            };

            // Login View
            if (view === 'login') {
                return (
                    <div style={{ padding: '2rem 1.5rem', maxWidth: '400px', margin: '0 auto', minHeight: '100vh', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                        <div style={{ textAlign: 'center', marginBottom: '2rem' }}>
                            <div style={{ fontSize: '48px', marginBottom: '1rem' }}>📋</div>
                            <h1 style={{ fontSize: '28px', fontWeight: '600', margin: '0 0 0.5rem', color: '#333' }}>
                                Attendance
                            </h1>
                            <p style={{ fontSize: '14px', color: '#666', margin: 0 }}>School attendance system</p>
                        </div>
                        
                        <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', marginBottom: '1.5rem' }}>
                            <div>
                                <label style={{ display: 'block', fontSize: '13px', marginBottom: '6px', color: '#666', fontWeight: '500' }}>Username</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    placeholder="john"
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                />
                            </div>
                            <div>
                                <label style={{ fontSize: '13px', marginBottom: '6px', color: '#666', fontWeight: '500', display: 'block' }}>Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="••••••••"
                                    onKeyPress={(e) => e.key === 'Enter' && handleLogin()}
                                />
                            </div>
                            <button onClick={handleLogin} style={{ marginTop: '8px', padding: '12px', backgroundColor: '#378ADD', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontSize: '16px', fontWeight: '600' }}>
                                Sign In
                            </button>
                        </div>
                        <div style={{ backgroundColor: '#f0f4ff', padding: '1rem', borderRadius: '8px', fontSize: '13px', color: '#666' }}>
                            <p style={{ margin: '0 0 0.5rem', fontWeight: '500' }}>Demo Credentials:</p>
                            <p style={{ margin: '4px 0' }}>👤 Admin: admin / admin123</p>
                            <p style={{ margin: '4px 0' }}>👤 Employee: john / john123</p>
                        </div>
                    </div>
                );
            }

            // Employee Dashboard
            if (view === 'employee-dashboard' && isLoggedIn) {
                return (
                    <div style={{ padding: '1.5rem', maxWidth: '500px', margin: '0 auto', minHeight: '100vh', backgroundColor: '#f5f5f5' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                            <div>
                                <h2 style={{ fontSize: '20px', fontWeight: '600', margin: '0 0 0.25rem', color: '#333' }}>
                                    👋 {currentUser.name}
                                </h2>
                                <p style={{ fontSize: '13px', color: '#666', margin: 0 }}>
                                    {new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </p>
                            </div>
                            <button onClick={handleLogout} style={{ padding: '8px 12px', fontSize: '13px', backgroundColor: 'white', border: '0.5px solid #ccc', borderRadius: '6px', cursor: 'pointer', color: '#333' }}>
                                Logout
                            </button>
                        </div>

                        {todayRecord ? (
                            <div style={{ backgroundColor: 'white', borderRadius: '8px', padding: '1.25rem', marginBottom: '1.5rem', border: '0.5px solid #ddd', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                                <h3 style={{ fontSize: '14px', fontWeight: '600', margin: '0 0 1rem', color: '#333' }}>Today's Status</h3>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '1rem' }}>
                                    <div style={{ backgroundColor: '#f9f9f9', padding: '12px', borderRadius: '6px', border: '0.5px solid #eee' }}>
                                        <p style={{ fontSize: '12px', color: '#666', margin: '0 0 4px' }}>Check In</p>
                                        <p style={{ fontSize: '18px', fontWeight: '600', margin: 0, color: '#333' }}>⏰ {todayRecord.checkInTime}</p>
                                    </div>
                                    <div style={{ backgroundColor: '#f9f9f9', padding: '12px', borderRadius: '6px', border: '0.5px solid #eee' }}>
                                        <p style={{ fontSize: '12px', color: '#666', margin: '0 0 4px' }}>Check Out</p>
                                        <p style={{ fontSize: '18px', fontWeight: '600', margin: 0, color: todayRecord.checkOutTime ? '#333' : '#999' }}>
                                            {todayRecord.checkOutTime ? '⏰ ' + todayRecord.checkOutTime : '⏳ Pending'}
                                        </p>
                                    </div>
                                </div>
                                {todayRecord.hoursWorked && (
                                    <div style={{ backgroundColor: '#f0f9f0', padding: '12px', borderRadius: '6px', textAlign: 'center', border: '0.5px solid #d4edda' }}>
                                        <p style={{ fontSize: '13px', color: '#3B6D11', margin: 0, fontWeight: '500' }}>
                                            ✓ {todayRecord.hoursWorked} hours worked
                                        </p>
                                    </div>
                                )}
                            </div>
                        ) : null}

                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                            {!todayRecord ? (
                                <button onClick={handleCheckIn} style={{ padding: '16px', fontSize: '15px', fontWeight: '600', backgroundColor: '#639922', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', gridColumn: '1 / -1' }}>
                                    ▶ Start Work
                                </button>
                            ) : !todayRecord.checkOutTime ? (
                                <>
                                    <div></div>
                                    <button onClick={handleCheckOut} style={{ padding: '16px', fontSize: '15px', fontWeight: '600', backgroundColor: '#E24B4A', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer' }}>
                                        ⏹ End Work
                                    </button>
                                </>
                            ) : null}
                        </div>

                        <div style={{ marginTop: '2rem' }}>
                            <h3 style={{ fontSize: '14px', fontWeight: '600', marginBottom: '1rem', color: '#333' }}>Attendance History</h3>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '300px', overflowY: 'auto' }}>
                                {attendanceData.filter(r => r.employeeId === currentUser.id).slice().reverse().map((record, idx) => (
                                    <div key={idx} style={{ backgroundColor: 'white', padding: '12px', borderRadius: '6px', border: '0.5px solid #ddd', fontSize: '13px' }}>
                                        <p style={{ margin: '0 0 4px', fontWeight: '600', color: '#333' }}>{record.date}</p>
                                        <div style={{ display: 'flex', justifyContent: 'space-between', gap: '8px', color: '#666' }}>
                                            <span>In: {record.checkInTime}</span>
                                            <span>Out: {record.checkOutTime || '-'}</span>
                                            {record.hoursWorked && <span style={{ color: '#639922', fontWeight: '600' }}>{record.hoursWorked}h</span>}
                                        </div>
                                    </div>
                                ))}
                                {attendanceData.filter(r => r.employeeId === currentUser.id).length === 0 && (
                                    <p style={{ color: '#999', fontSize: '13px', textAlign: 'center', padding: '1rem' }}>No attendance records yet</p>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // Admin Dashboard
            if (view === 'admin-dashboard' && isLoggedIn) {
                const todayRecords = attendanceData.filter(r => r.date === new Date().toLocaleDateString());
                const currentlyWorking = todayRecords.filter(r => r.checkOutTime === null && r.checkInTime);
                const totalHoursToday = todayRecords.reduce((sum, r) => sum + (r.hoursWorked || 0), 0);

                return (
                    <div style={{ padding: '1.5rem', maxWidth: '900px', margin: '0 auto', minHeight: '100vh', backgroundColor: '#f5f5f5' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                            <div>
                                <h2 style={{ fontSize: '24px', fontWeight: '600', margin: '0 0 0.5rem', color: '#333' }}>
                                    📊 Admin Dashboard
                                </h2>
                                <p style={{ fontSize: '13px', color: '#666', margin: 0 }}>
                                    {new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                </p>
                            </div>
                            <button onClick={handleLogout} style={{ padding: '8px 12px', fontSize: '13px', backgroundColor: 'white', border: '0.5px solid #ccc', borderRadius: '6px', cursor: 'pointer', color: '#333' }}>
                                Logout
                            </button>
                        </div>

                        {/* Stats Cards */}
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '12px', marginBottom: '1.5rem' }}>
                            <div style={{ backgroundColor: 'white', padding: '1rem', borderRadius: '8px', border: '0.5px solid #ddd', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                                <p style={{ fontSize: '12px', color: '#666', margin: '0 0 6px', fontWeight: '500' }}>Currently Working</p>
                                <p style={{ fontSize: '32px', fontWeight: '700', margin: 0, color: '#378ADD' }}>{currentlyWorking.length}</p>
                            </div>
                            <div style={{ backgroundColor: 'white', padding: '1rem', borderRadius: '8px', border: '0.5px solid #ddd', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                                <p style={{ fontSize: '12px', color: '#666', margin: '0 0 6px', fontWeight: '500' }}>Total Employees</p>
                                <p style={{ fontSize: '32px', fontWeight: '700', margin: 0, color: '#333' }}>{employees.filter(e => !e.isAdmin).length}</p>
                            </div>
                            <div style={{ backgroundColor: 'white', padding: '1rem', borderRadius: '8px', border: '0.5px solid #ddd', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                                <p style={{ fontSize: '12px', color: '#666', margin: '0 0 6px', fontWeight: '500' }}>Hours Today</p>
                                <p style={{ fontSize: '32px', fontWeight: '700', margin: 0, color: '#639922' }}>{Math.round(totalHoursToday * 10) / 10}</p>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div style={{ display: 'flex', gap: '12px', marginBottom: '1.5rem', borderBottom: '0.5px solid #ddd', paddingBottom: '1rem' }}>
                            <button
                                onClick={() => setView('admin-dashboard')}
                                style={{ padding: '8px 16px', fontSize: '14px', backgroundColor: 'transparent', border: 'none', borderBottom: '2px solid #378ADD', cursor: 'pointer', color: '#333', fontWeight: '600' }}
                            >
                                📅 Today's Records
                            </button>
                            <button
                                onClick={() => setView('admin-employees')}
                                style={{ padding: '8px 16px', fontSize: '14px', backgroundColor: 'transparent', border: 'none', cursor: 'pointer', color: '#666' }}
                            >
                                👥 Employees
                            </button>
                            <button
                                onClick={() => setView('admin-reports')}
                                style={{ padding: '8px 16px', fontSize: '14px', backgroundColor: 'transparent', border: 'none', cursor: 'pointer', color: '#666' }}
                            >
                                📈 Reports
                            </button>
                        </div>

                        {/* Today's Records */}
                        <div>
                            <h3 style={{ fontSize: '15px', fontWeight: '600', marginBottom: '1rem', color: '#333' }}>Today's Attendance</h3>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', marginBottom: '1.5rem', maxHeight: '400px', overflowY: 'auto' }}>
                                {todayRecords.length > 0 ? (
                                    todayRecords.map(record => (
                                        <div key={record.id} style={{ backgroundColor: 'white', padding: '12px', borderRadius: '8px', border: '0.5px solid #ddd', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <div>
                                                <p style={{ margin: '0 0 4px', fontWeight: '600', color: '#333' }}>{record.employeeName}</p>
                                                <div style={{ fontSize: '12px', color: '#666', display: 'flex', gap: '12px' }}>
                                                    <span>In: {record.checkInTime}</span>
                                                    <span>Out: {record.checkOutTime || <span style={{ color: '#378ADD', fontWeight: '600' }}>Working</span>}</span>
                                                </div>
                                            </div>
                                            {record.hoursWorked && <span style={{ fontWeight: '600', color: '#639922', fontSize: '14px' }}>{record.hoursWorked}h</span>}
                                        </div>
                                    ))
                                ) : (
                                    <p style={{ color: '#999', fontSize: '14px', textAlign: 'center', padding: '1rem' }}>No attendance records for today</p>
                                )}
                            </div>

                            <button
                                onClick={exportToCSV}
                                style={{ padding: '10px 16px', fontSize: '14px', fontWeight: '600', backgroundColor: '#378ADD', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer' }}
                            >
                                📥 Export Today's Records
                            </button>
                        </div>
                    </div>
                );
            }

            // Admin Employees View
            if (view === 'admin-employees' && isLoggedIn) {
                return (
                    <div style={{ padding: '1.5rem', maxWidth: '900px', margin: '0 auto', minHeight: '100vh', backgroundColor: '#f5f5f5' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                            <h2 style={{ fontSize: '24px', fontWeight: '600', margin: 0, color: '#333' }}>
                                👥 Manage Employees
                            </h2>
                            <button
                                onClick={() => setView('admin-dashboard')}
                                style={{ padding: '8px 12px', fontSize: '13px', backgroundColor: 'white', border: '0.5px solid #ccc', borderRadius: '6px', cursor: 'pointer' }}
                            >
                                Back
                            </button>
                        </div>

                        <button
                            onClick={() => setShowAddEmployee(!showAddEmployee)}
                            style={{ padding: '10px 16px', fontSize: '14px', fontWeight: '600', backgroundColor: '#639922', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', marginBottom: '1.5rem' }}
                        >
                            ➕ Add Employee
                        </button>

                        {showAddEmployee && (
                            <div style={{ backgroundColor: 'white', padding: '1.25rem', borderRadius: '8px', marginBottom: '1.5rem', border: '0.5px solid #ddd', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                                <h3 style={{ fontSize: '14px', fontWeight: '600', margin: '0 0 1rem', color: '#333' }}>Add New Employee</h3>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                    <div>
                                        <label style={{ display: 'block', fontSize: '13px', marginBottom: '6px', color: '#666', fontWeight: '500' }}>Full Name</label>
                                        <input type="text" value={newEmployeeName} onChange={(e) => setNewEmployeeName(e.target.value)} placeholder="John Doe" />
                                    </div>
                                    <div>
                                        <label style={{ display: 'block', fontSize: '13px', marginBottom: '6px', color: '#666', fontWeight: '500' }}>Username</label>
                                        <input type="text" value={newEmployeeUser} onChange={(e) => setNewEmployeeUser(e.target.value)} placeholder="john.doe" />
                                    </div>
                                    <div>
                                        <label style={{ display: 'block', fontSize: '13px', marginBottom: '6px', color: '#666', fontWeight: '500' }}>Password</label>
                                        <input type="password" value={newEmployeePass} onChange={(e) => setNewEmployeePass(e.target.value)} placeholder="••••••••" />
                                    </div>
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <button onClick={handleAddEmployee} style={{ flex: 1, padding: '10px', backgroundColor: '#639922', color: 'white', border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: '600' }}>
                                            Add
                                        </button>
                                        <button onClick={() => setShowAddEmployee(false)} style={{ flex: 1, padding: '10px', backgroundColor: 'white', border: '0.5px solid #ccc', borderRadius: '6px', cursor: 'pointer', fontWeight: '600' }}>
                                            Cancel
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        <h3 style={{ fontSize: '15px', fontWeight: '600', marginBottom: '1rem', color: '#333' }}>All Employees ({employees.filter(e => !e.isAdmin).length})</h3>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '12px' }}>
                            {employees.filter(e => !e.isAdmin).map(emp => (
                                <div key={emp.id} style={{ backgroundColor: 'white', padding: '12px', borderRadius: '8px', border: '0.5px solid #ddd', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '1rem' }}>
                                        <div style={{ width: '44px', height: '44px', borderRadius: '50%', backgroundColor: '#378ADD', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white', fontWeight: '600', fontSize: '16px' }}>
                                            {getInitials(emp.name)}
                                        </div>
                                        <div style={{ flex: 1 }}>
                                            <p style={{ margin: '0 0 4px', fontWeight: '600', color: '#333' }}>{emp.name}</p>
                                            <p style={{ margin: 0, fontSize: '12px', color: '#666' }}>@{emp.username}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => handleDeleteEmployee(emp.id)} style={{ width: '100%', padding: '8px', fontSize: '12px', backgroundColor: '#ffe6e6', color: '#E24B4A', border: 'none', borderRadius: '6px', cursor: 'pointer', fontWeight: '600' }}>
                                        🗑 Delete
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // Admin Reports View
            if (view === 'admin-reports' && isLoggedIn) {
                const monthlyData = {};
                attendanceData.forEach(r => {
                    const month = r.date.substring(0, 7);
                    if (!monthlyData[month]) monthlyData[month] = { records: [], hours: 0 };
                    monthlyData[month].records.push(r);
                    monthlyData[month].hours += r.hoursWorked || 0;
                });

                const months = Object.keys(monthlyData).sort().reverse();

                return (
                    <div style={{ padding: '1.5rem', maxWidth: '900px', margin: '0 auto', minHeight: '100vh', backgroundColor: '#f5f5f5' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '1.5rem' }}>
                            <h2 style={{ fontSize: '24px', fontWeight: '600', margin: 0, color: '#333' }}>
                                📈 Attendance Reports
                            </h2>
                            <button
                                onClick={() => setView('admin-dashboard')}
                                style={{ padding: '8px 12px', fontSize: '13px', backgroundColor: 'white', border: '0.5px solid #ccc', borderRadius: '6px', cursor: 'pointer' }}
                            >
                                Back
                            </button>
                        </div>

                        <button
                            onClick={exportAllToCSV}
                            style={{ padding: '10px 16px', fontSize: '14px', fontWeight: '600', backgroundColor: '#378ADD', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer', marginBottom: '1.5rem' }}
                        >
                            📥 Export All Records
                        </button>

                        {months.length > 0 ? (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                {months.map(month => (
                                    <div key={month} style={{ backgroundColor: 'white', padding: '1rem', borderRadius: '8px', border: '0.5px solid #ddd' }}>
                                        <h3 style={{ fontSize: '15px', fontWeight: '600', margin: '0 0 0.75rem', color: '#333' }}>
                                            {new Date(month + '-01').toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                                        </h3>
                                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '12px', marginBottom: '1rem' }}>
                                            <div style={{ backgroundColor: '#f9f9f9', padding: '10px', borderRadius: '6px' }}>
                                                <p style={{ fontSize: '12px', color: '#666', margin: '0 0 4px' }}>Records</p>
                                                <p style={{ fontSize: '20px', fontWeight: '700', margin: 0, color: '#333' }}>{monthlyData[month].records.length}</p>
                                            </div>
                                            <div style={{ backgroundColor: '#f0f9f0', padding: '10px', borderRadius: '6px' }}>
                                                <p style={{ fontSize: '12px', color: '#666', margin: '0 0 4px' }}>Total Hours</p>
                                                <p style={{ fontSize: '20px', fontWeight: '700', margin: 0, color: '#639922' }}>{Math.round(monthlyData[month].hours * 10) / 10}</p>
                                            </div>
                                        </div>
                                        <details style={{ fontSize: '12px', color: '#666' }}>
                                            <summary style={{ cursor: 'pointer', fontWeight: '600', marginBottom: '8px' }}>View details</summary>
                                            <div style={{ paddingLeft: '12px', borderLeft: '2px solid #eee' }}>
                                                {monthlyData[month].records.map((r, idx) => (
                                                    <div key={idx} style={{ padding: '4px 0', borderBottom: '0.5px solid #eee' }}>
                                                        <span style={{ fontWeight: '500', color: '#333' }}>{r.employeeName}</span> - {r.date} ({r.hoursWorked || '-'}h)
                                                    </div>
                                                ))}
                                            </div>
                                        </details>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div style={{ backgroundColor: 'white', padding: '2rem', borderRadius: '8px', textAlign: 'center', border: '0.5px solid #ddd' }}>
                                <p style={{ fontSize: '14px', color: '#999' }}>No attendance records yet</p>
                            </div>
                        )}
                    </div>
                );
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AttendanceApp />);
    </script>
</body>
</html>
