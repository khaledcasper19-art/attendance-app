<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Attendance System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .screen { display: none; min-height: 100vh; padding: 20px; }
        .screen.active { display: block; }
        h1 { font-size: 28px; font-weight: 600; margin: 10px 0 5px; color: #333; }
        h2 { font-size: 20px; font-weight: 600; margin: 15px 0; }
        h3 { font-size: 15px; font-weight: 600; margin: 15px 0 10px; }
        p { font-size: 14px; color: #666; margin: 5px 0; }
        input { width: 100%; padding: 10px 12px; border: 0.5px solid #ccc; border-radius: 6px; font-size: 15px; margin: 8px 0; font-family: inherit; }
        input:focus { outline: none; border-color: #378ADD; box-shadow: 0 0 0 2px rgba(55, 138, 221, 0.1); }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; font-family: inherit; transition: all 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background: #378ADD; color: white; }
        .btn-success { background: #639922; color: white; }
        .btn-danger { background: #E24B4A; color: white; }
        .btn-secondary { background: white; border: 0.5px solid #ccc; color: #333; }
        .card { background: white; border: 0.5px solid #ddd; border-radius: 8px; padding: 15px; margin: 15px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 15px 0; }
        .stat { background: white; padding: 15px; border-radius: 8px; border: 0.5px solid #ddd; text-align: center; }
        .stat-number { font-size: 32px; font-weight: 700; color: #378ADD; }
        .record { background: white; padding: 12px; border-radius: 8px; border: 0.5px solid #ddd; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .record-name { font-weight: 600; margin: 0 0 4px; }
        .record-time { font-size: 12px; color: #666; }
        .header { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .demo-box { background: #f0f4ff; padding: 12px; border-radius: 8px; font-size: 13px; color: #666; margin: 15px 0; }
        .status-box { background: #f9f9f9; padding: 12px; border-radius: 6px; }
        .status-box p:first-child { font-size: 12px; color: #666; margin: 0 0 4px; }
        .status-box p:last-child { font-size: 18px; font-weight: 600; margin: 0; }
        .icon { font-size: 48px; text-align: center; margin: 20px 0; }
        .success { color: #639922; }
        .center { text-align: center; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen active">
        <div class="container" style="display: flex; flex-direction: column; justify-content: center; min-height: 100vh;">
            <div class="center">
                <div class="icon">📋</div>
                <h1>Attendance</h1>
                <p>School attendance system</p>
            </div>
            <input type="text" id="username" placeholder="Username" />
            <input type="password" id="password" placeholder="Password" />
            <button class="btn-primary" onclick="login()">Sign In</button>
            <div class="demo-box">
                <p style="font-weight: 500; margin-bottom: 8px;">Demo Credentials:</p>
                <p>👤 Admin: admin / admin123</p>
                <p>👤 Employee: john / john123</p>
            </div>
        </div>
    </div>

    <!-- Employee Screen -->
    <div id="employeeScreen" class="screen">
        <div class="container">
            <div class="header">
                <div>
                    <h2 id="empName">👋 John</h2>
                    <p id="empDate"></p>
                </div>
                <button class="btn-secondary" style="width: 100px;" onclick="logout()">Logout</button>
            </div>

            <div id="todayStatus" class="card" style="display: none;">
                <h3>Today's Status</h3>
                <div class="grid">
                    <div class="status-box">
                        <p>Check In</p>
                        <p id="checkInTime">⏰ --:--</p>
                    </div>
                    <div class="status-box">
                        <p>Check Out</p>
                        <p id="checkOutTime">⏳ Pending</p>
                    </div>
                </div>
                <div id="hoursWorked" style="display: none; background: #f0f9f0; padding: 12px; border-radius: 6px; color: #3B6D11; font-weight: 500; text-align: center;"></div>
            </div>

            <div id="checkInBtn">
                <button class="btn-success" onclick="checkIn()">▶ Start Work</button>
            </div>
            <div id="checkOutBtn" style="display: none;">
                <button class="btn-danger" onclick="checkOut()">⏹ End Work</button>
            </div>
        </div>
    </div>

    <!-- Admin Screen -->
    <div id="adminScreen" class="screen">
        <div class="container">
            <div class="header">
                <h2>📊 Dashboard</h2>
                <button class="btn-secondary" style="width: 100px;" onclick="logout()">Logout</button>
            </div>

            <div class="grid">
                <div class="stat">
                    <p>Employees Today</p>
                    <div class="stat-number" id="todayCount">0</div>
                </div>
                <div class="stat">
                    <p>Total Staff</p>
                    <div class="stat-number" id="totalCount">0</div>
                </div>
            </div>

            <h3>Today's Records</h3>
            <div id="recordsList"></div>
        </div>
    </div>

    <script>
        // Data Management
        let employees = JSON.parse(localStorage.getItem('employees')) || [
            { id: 1, name: 'Admin User', username: 'admin', password: 'admin123', isAdmin: true },
            { id: 2, name: 'John Smith', username: 'john', password: 'john123', isAdmin: false },
            { id: 3, name: 'Sarah Johnson', username: 'sarah', password: 'sarah123', isAdmin: false },
        ];
        let attendance = JSON.parse(localStorage.getItem('attendance')) || [];
        let currentUser = null;

        localStorage.setItem('employees', JSON.stringify(employees));

        // UI Management
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Login
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const user = employees.find(e => e.username === username && e.password === password);
            if (user) {
                currentUser = user;
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                if (user.isAdmin) {
                    loadAdmin();
                    showScreen('adminScreen');
                } else {
                    loadEmployee();
                    showScreen('employeeScreen');
                }
            } else {
                alert('Invalid credentials. Try admin/admin123 or john/john123');
            }
        }

        // Logout
        function logout() {
            currentUser = null;
            showScreen('loginScreen');
        }

        // Employee Functions
        function loadEmployee() {
            const today = new Date().toLocaleDateString();
            const todayRecord = attendance.find(r => r.employeeId === currentUser.id && r.date === today);
            document.getElementById('empName').textContent = '👋 ' + currentUser.name;
            document.getElementById('empDate').textContent = today;

            if (todayRecord) {
                document.getElementById('todayStatus').style.display = 'block';
                document.getElementById('checkInTime').textContent = '⏰ ' + todayRecord.checkInTime;
                document.getElementById('checkInBtn').style.display = 'none';
                if (todayRecord.checkOutTime) {
                    document.getElementById('checkOutTime').textContent = '⏰ ' + todayRecord.checkOutTime;
                    document.getElementById('checkOutBtn').style.display = 'none';
                    document.getElementById('hoursWorked').style.display = 'block';
                    document.getElementById('hoursWorked').textContent = '✓ ' + todayRecord.hoursWorked + ' hours worked';
                } else {
                    document.getElementById('checkOutTime').textContent = '⏳ Pending';
                    document.getElementById('checkOutBtn').style.display = 'block';
                }
            } else {
                document.getElementById('todayStatus').style.display = 'none';
                document.getElementById('checkInBtn').style.display = 'block';
                document.getElementById('checkOutBtn').style.display = 'none';
            }
        }

        function checkIn() {
            const today = new Date().toLocaleDateString();
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            attendance.push({
                id: Date.now(),
                employeeId: currentUser.id,
                employeeName: currentUser.name,
                date: today,
                checkInTime: now,
                checkOutTime: null,
                hoursWorked: null,
            });
            localStorage.setItem('attendance', JSON.stringify(attendance));
            loadEmployee();
        }

        function checkOut() {
            const today = new Date().toLocaleDateString();
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            attendance = attendance.map(r => {
                if (r.employeeId === currentUser.id && r.date === today) {
                    const [inH, inM] = r.checkInTime.split(':').map(Number);
                    const [outH, outM] = now.split(':').map(Number);
                    const hours = Math.round(((outH * 60 + outM) - (inH * 60 + inM)) / 60 * 100) / 100;
                    return { ...r, checkOutTime: now, hoursWorked: Math.max(0, hours) };
                }
                return r;
            });
            localStorage.setItem('attendance', JSON.stringify(attendance));
            loadEmployee();
        }

        // Admin Functions
        function loadAdmin() {
            const today = new Date().toLocaleDateString();
            const todayRecords = attendance.filter(r => r.date === today);
            document.getElementById('todayCount').textContent = todayRecords.length;
            document.getElementById('totalCount').textContent = employees.filter(e => !e.isAdmin).length;

            const recordsList = document.getElementById('recordsList');
            recordsList.innerHTML = '';
            if (todayRecords.length > 0) {
                todayRecords.forEach(record => {
                    const div = document.createElement('div');
                    div.className = 'record';
                    div.innerHTML = `
                        <div>
                            <p class="record-name">${record.employeeName}</p>
                            <p class="record-time">In: ${record.checkInTime} | Out: ${record.checkOutTime || 'Working'}</p>
                        </div>
                        ${record.hoursWorked ? `<span style="font-weight: 600; color: #639922;">${record.hoursWorked}h</span>` : ''}
                    `;
                    recordsList.appendChild(div);
                });
            } else {
                recordsList.innerHTML = '<p style="text-align: center; color: #999;">No records today</p>';
            }
        }

        // Initialize
        document.getElementById('empDate').textContent = new Date().toLocaleDateString();
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
